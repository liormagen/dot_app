name: dot_story
description: Connect numbered dots to reveal drawings - an iPad game for children.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  shared_preferences: ^2.2.2
  audioplayers: ^6.0.0
  in_app_purchase: ^3.1.13
  go_router: ^13.2.0
  gal: ^1.3.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  fake_async: any

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/characters/
    - assets/story_cards/
    - assets/stories/stories.json
    - assets/stories/story1/ch1/
    - assets/stories/story1/ch2/
    - assets/stories/story1/ch3/
    - assets/stories/story2/ch1/
    - assets/stories/story2/ch2/
    - assets/stories/story2/ch3/
    - assets/stories/story3/ch1/
    - assets/stories/story3/ch2/
    - assets/stories/story3/ch3/
    - assets/stories/story4/ch1/
    - assets/stories/story4/ch2/
    - assets/stories/story4/ch3/
    - assets/stories/story4/ch4/
    - assets/stories/story4/ch5/
    - assets/stories/story5/ch1/
    - assets/stories/story5/ch2/
    - assets/stories/story5/ch3/
    - assets/stories/story6/ch1/
    - assets/stories/story6/ch2/
    - assets/stories/story6/ch3/
    - assets/stories/story8/ch1/
    - assets/stories/story8/ch2/
    - assets/stories/story8/ch3/
    - assets/stories/story8/ch4/
    - assets/stories/story8/ch5/
    - assets/stories/story9/ch1/
    - assets/stories/story9/ch2/
    - assets/stories/story9/ch3/
    - assets/stories/story10/ch1/
    - assets/stories/story10/ch2/
    - assets/stories/story10/ch3/
    - assets/stories/story10/ch4/
    - assets/stories/story10/ch5/
    - assets/audio/
    - assets/audio/en/
    - assets/audio/en/numbers/
    - assets/audio/he/
    - assets/audio/he/numbers/
    - assets/audio/ar/
    - assets/audio/ar/numbers/
    - assets/audio/encouragement/
    - assets/audio/sfx/
    - assets/audio/music/
    - assets/fonts/

  fonts:
    - family: Boogaloo
      fonts:
        - asset: assets/fonts/Boogaloo-Regular.ttf
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-Medium.ttf
          weight: 500
        - asset: assets/fonts/Fredoka-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Fredoka-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700

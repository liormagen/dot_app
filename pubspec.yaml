name: dot_story
description: Connect numbered dots to reveal drawings - an iPad game for children.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  shared_preferences: ^2.2.2
  audioplayers: ^6.0.0
  in_app_purchase: ^3.1.13
  go_router: ^13.2.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/drawings/knight/
    - assets/drawings/dragon/
    - assets/drawings/castle/
    - assets/drawings/knight_s2/
    - assets/drawings/dragon_s2/
    - assets/drawings/castle_s2/
    - assets/drawings/knight_s3/
    - assets/drawings/dragon_s3/
    - assets/drawings/castle_s3/
    - assets/drawings/knight_s4/
    - assets/drawings/dragon_s4/
    - assets/drawings/castle_s4/
    - assets/drawings/knight_s5/
    - assets/drawings/dragon_s5/
    - assets/drawings/castle_s5/
    - assets/characters/
    - assets/story_cards/
    - assets/stories/
    - assets/audio/
    - assets/audio/en/
    - assets/audio/en/numbers/
    - assets/audio/he/
    - assets/audio/he/numbers/
    - assets/audio/ar/
    - assets/audio/ar/numbers/
    - assets/audio/encouragement/
    - assets/audio/sfx/
